<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d1117">
  <title>Á&Zs Feladatok</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#0d1117; --surf:#161b22; --surf2:#21262d; --surf3:#2d333b;
      --border:#30363d; --text:#c9d1d9; --muted:#6e7681; --subtle:#3d444d;
      --blue:#58a6ff; --blue-bg:#0d2149; --green:#3fb950; --green-bg:#0a2614;
      --orange:#e3b341; --orange-bg:#2d1a00; --red:#f85149; --red-bg:#2a0a0a;
      --purple:#a371f7; --purple-bg:#1e0a3c;
      --taskred:#ff4d4d;
      --font:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --r:8px;
      --nav-h:58px;
    }
    html, body { background:var(--bg); color:var(--text); font-family:var(--font); font-size:14px; line-height:1.5; }
    body { min-height:100vh; padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom)); }

    /* ── HEADER ── */
    .hdr { position:sticky; top:0; background:var(--surf); border-bottom:1px solid var(--border);
           display:flex; align-items:center; padding:0 14px; height:50px; gap:10px; z-index:100;
           padding-top:env(safe-area-inset-top); height:calc(50px + env(safe-area-inset-top)); }
    .logo { font-size:16px; font-weight:700; letter-spacing:-.3px; }
    .sync-dot { width:8px; height:8px; border-radius:50%; background:var(--subtle); flex-shrink:0; transition:background .2s; }
    .sync-dot.ok   { background:var(--green); }
    .sync-dot.busy { background:var(--orange); }
    .sync-dot.err  { background:var(--red); }
    .hdr-spacer { flex:1; }
    .icon-btn { background:var(--surf2); border:1px solid var(--border); color:var(--muted);
                width:32px; height:32px; border-radius:7px; cursor:pointer;
                display:flex; align-items:center; justify-content:center; transition:all .12s; flex-shrink:0; }
    .icon-btn:hover { background:var(--surf3); color:var(--text); }

    /* ── BOTTOM NAV ── */
    .bnav { position:fixed; bottom:0; left:0; right:0; height:calc(var(--nav-h) + env(safe-area-inset-bottom));
            padding-bottom:env(safe-area-inset-bottom);
            background:var(--surf); border-top:1px solid var(--border);
            display:flex; z-index:150; }
    .bnav button { flex:1; background:none; border:none; color:var(--muted); cursor:pointer;
                   display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
                   font-size:10px; font-weight:600; font-family:var(--font); letter-spacing:.02em; transition:color .12s; }
    .bnav button svg { width:21px; height:21px; }
    .bnav button.active { color:var(--taskred); }
    .bnav button.active[data-page="followup"] { color:var(--blue); }

    .page { display:none; padding:14px 14px 24px; max-width:980px; margin:0 auto; }
    @media (min-width:700px) { #page-calendar, #page-followup { max-width:1400px; } }
    .page.active { display:block; }

    /* ── KÖZÖS: szekciócím, kártya ── */
    .seclabel { font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin:0 0 8px 2px; }

    /* ── PENDING kártyák (közös) ── */
    .pending-sec { margin-bottom:16px; display:none; }
    .pending-sec.has-items { display:block; }
    .pending-card { background:var(--surf); border:1px solid var(--orange); border-left:3px solid var(--orange);
                    border-radius:var(--r); padding:11px 12px; margin-bottom:7px;
                    display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .pi { flex:1; min-width:180px; }
    .pi-to { font-size:11px; font-weight:700; color:var(--orange); margin-bottom:2px; }
    .pi-text { font-size:13px; color:var(--text); margin-bottom:2px; word-break:break-word; }
    .pi-src { font-size:11px; color:var(--muted); }
    .pi-date { font-size:11px; font-weight:600; color:var(--orange); background:var(--orange-bg); padding:2px 8px; border-radius:4px; white-space:nowrap; }
    .pa { display:flex; gap:5px; }
    .btn-pa { border:none; border-radius:5px; padding:6px 10px; font-size:12px; font-family:var(--font); cursor:pointer; font-weight:500; }
    .btn-pa.ok { background:var(--green-bg); color:var(--green); border:1px solid var(--green); }
    .btn-pa.no { background:none; border:none; color:var(--muted); font-size:16px; padding:4px 8px; }
    .btn-pa.no:active { color:var(--red); }

    /* ════ FELADATOK ════ */
    .board { display:grid; grid-template-columns:1fr; gap:14px; }
    @media (min-width:700px) { .board { grid-template-columns:1fr 1fr; } }
    .column { background:var(--surf); border-radius:12px; padding:16px; border:1px solid var(--border); }
    .column-header { display:flex; align-items:center; gap:8px; margin-bottom:14px; }
    .dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .col-important .dot { background:var(--taskred); }
    .col-low .dot { background:#555; }
    .column-header h2 { font-size:12px; font-weight:600; letter-spacing:.07em; text-transform:uppercase; color:var(--muted); }
    .add-area { display:flex; flex-direction:column; gap:6px; }
    .add-row { display:flex; gap:7px; align-items:center; }
    .add-row input[type="text"] { flex:1; min-width:0; border:1.5px solid var(--surf3); border-radius:7px;
      padding:9px 11px; font-size:14px; font-family:inherit; color:var(--text); background:var(--surf2); outline:none; }
    .add-row input[type="text"]:focus { border-color:var(--muted); }
    .add-row input::placeholder { color:var(--subtle); }
    .date-row { display:flex; gap:8px; align-items:center; }
    .date-row label { font-size:11px; color:var(--subtle); white-space:nowrap; }
    .date-row input[type="date"] { flex:1; border:1.5px solid var(--surf3); border-radius:7px;
      padding:7px 10px; font-size:13px; font-family:inherit; color:var(--muted); background:var(--surf2); outline:none; color-scheme:dark; }
    .btn-add { border:none; background:var(--surf3); color:var(--muted); border-radius:7px; padding:9px 14px;
      font-size:19px; line-height:1; cursor:pointer; flex-shrink:0; }
    .col-important .btn-add { background:rgba(255,77,77,.18); color:#ff6b6b; }
    .btn-clock { border:none; border-radius:7px; padding:9px 10px; background:var(--surf3); color:var(--muted);
      cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .col-important .btn-clock { background:rgba(255,77,77,.12); color:#c44; }
    .scheduler-row { display:none; align-items:center; gap:6px; animation:fadeUp .15s ease; }
    .scheduler-row.open { display:flex; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }
    .scheduler-row input[type="datetime-local"] { flex:1; min-width:0; border:1.5px solid var(--surf3); border-radius:7px;
      padding:8px 10px; font-size:13px; font-family:inherit; color:var(--text); background:var(--surf2); outline:none; color-scheme:dark; }
    .btn-sched-confirm { border:none; border-radius:7px; padding:8px 12px; font-size:12px; font-family:inherit;
      font-weight:600; background:#f0f0f0; color:#111; cursor:pointer; white-space:nowrap; }
    .col-important .btn-sched-confirm { background:var(--taskred); color:#fff; }
    .btn-sched-cancel { border:none; background:none; color:var(--subtle); font-size:18px; cursor:pointer; padding:4px 6px; }

    .task-list { list-style:none; min-height:36px; margin-top:12px; }
    .task { display:flex; align-items:flex-start; gap:10px; padding:10px; border-radius:7px; margin-bottom:5px;
            cursor:pointer; user-select:none; line-height:1.45; font-size:14px; }
    .col-important .task { background:rgba(255,77,77,.1); color:#ff7070; border-left:3px solid var(--taskred); }
    .col-low .task { background:var(--surf2); color:#9aa; border-left:3px solid var(--surf3); }
    .task.done { opacity:.3; text-decoration:line-through; }
    .task .check { width:16px; height:16px; border-radius:50%; border:1.5px solid currentColor; flex-shrink:0; margin-top:2px; }
    .task.done .check { background:currentColor; }
    .task .tdate { font-size:11px; color:var(--muted); margin-left:6px; white-space:nowrap; }
    .task .remove { margin-left:auto; flex-shrink:0; font-size:18px; line-height:1; color:var(--subtle); padding:0 4px; }
    .task .remove:active { color:var(--taskred); }
    .empty-hint { font-size:12px; color:var(--subtle); text-align:center; padding:10px 0; }

    /* ════ JELENLÉT ════ */
    .board-presence { display:grid; grid-template-columns:1fr; gap:12px; }
    @media (min-width:560px) { .board-presence { grid-template-columns:1fr 1fr; } }
    @media (min-width:900px) { .board-presence { grid-template-columns:1fr 1fr 1fr; } }
    .col-presence .task { background:color-mix(in srgb, var(--cc,#555) 12%, var(--surf)); color:color-mix(in srgb, var(--cc,#aaa) 80%, #ccc); border-left:3px solid var(--cc,#555); }
    .col-presence .btn-add { background:color-mix(in srgb, var(--cc,#555) 18%, var(--surf2)); color:color-mix(in srgb, var(--cc,#aaa) 90%, #fff); }
    .col-presence .dot { background:var(--cc,#555); }

    /* ════ NAPTÁR (heti, mobilon egymás alatt) ════ */
    .cal-topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:10px; }
    .cal-nav { display:flex; align-items:center; gap:8px; }
    .cal-nav-btn { background:var(--surf2); border:1px solid var(--border); color:var(--muted); width:34px; height:34px;
      border-radius:8px; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .cal-today-btn { border:1px solid var(--border); background:var(--surf2); color:var(--muted); padding:0 13px; height:34px;
      border-radius:8px; font-size:12px; font-family:inherit; font-weight:600; cursor:pointer; }
    .cal-week-label { font-size:14px; font-weight:600; color:var(--text); }
    .cal-add-btn { background:var(--taskred); border:none; color:#fff; padding:9px 16px; border-radius:8px;
      font-size:13px; font-weight:700; font-family:inherit; cursor:pointer; }
    .cal-legend { display:flex; gap:6px; }
    .cal-legend span { padding:3px 9px; border-radius:5px; font-size:10px; font-weight:700; }
    .leg-personal { background:rgba(255,77,77,.25); color:#ff9090; border-left:2px solid var(--taskred); }
    .leg-presence { background:rgba(80,200,120,.2); color:#80e09a; border-left:2px solid #4caf50; }

    .week-list { display:flex; flex-direction:column; gap:8px; }
    @media (min-width:700px) { .week-list { display:grid; grid-template-columns:repeat(7,1fr); gap:8px; } }
    .wday { background:var(--surf); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
    .wday.today { border-color:var(--taskred); }
    .wday-head { display:flex; align-items:baseline; gap:8px; padding:9px 12px 7px; border-bottom:1px solid var(--surf2); }
    @media (min-width:700px) { .wday-head { flex-direction:column; align-items:center; gap:2px; text-align:center; } }
    .wday-dow { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--subtle); }
    .wday-num { font-size:17px; font-weight:700; color:var(--muted); }
    @media (min-width:700px) { .wday-num { font-size:22px; } }
    .wday.today .wday-dow, .wday.today .wday-num { color:var(--taskred); }
    .wday-body { padding:8px 10px; min-height:34px; display:flex; flex-direction:column; gap:5px; }
    @media (min-width:700px) { .wday-body { min-height:200px; } }
    .cal-chip { font-size:13px; padding:7px 9px; border-radius:6px; display:flex; align-items:center; gap:6px;
      user-select:none; border:1px solid transparent; cursor:pointer; }
    .cal-chip.personal { background:rgba(255,77,77,.18); color:#ff9090; border-color:rgba(255,77,77,.3); }
    .cal-chip.presence { background:rgba(80,200,120,.15); color:#80e09a; border-color:rgba(80,200,120,.25); }
    .cal-chip.done-chip { opacity:.25; text-decoration:line-through; }
    .cal-chip-text { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .empty-day { color:var(--subtle); font-size:12px; text-align:center; }

    /* ════ FOLLOW-UP ════ */
    .fu-topbar { display:flex; align-items:center; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
    .wk-info { display:flex; align-items:center; gap:6px; }
    .wk-label { font-size:13px; font-weight:600; }
    .parity { font-size:10px; font-weight:700; padding:2px 7px; border-radius:10px; letter-spacing:.3px; }
    .parity.odd { background:var(--blue-bg); color:var(--blue); }
    .parity.even { background:var(--green-bg); color:var(--green); }

    .fu-tabs { display:flex; gap:0; margin-bottom:12px; border-bottom:1px solid var(--border); overflow-x:auto; }
    .fu-tab { padding:0 13px; height:40px; background:none; border:none; border-bottom:2px solid transparent;
      color:var(--muted); font-size:12.5px; font-weight:500; font-family:var(--font); cursor:pointer;
      display:flex; align-items:center; gap:6px; white-space:nowrap; }
    .fu-tab.active.ext  { color:var(--blue);  border-bottom-color:var(--blue); }
    .fu-tab.active.int  { color:var(--green); border-bottom-color:var(--green); }
    .fu-tab.active.warm { color:var(--red);   border-bottom-color:var(--red); }
    .fu-tab.active.cold { color:var(--blue);  border-bottom-color:var(--blue); }
    .tcnt { background:var(--surf2); border:1px solid var(--border); border-radius:9px; padding:0 5px; font-size:10px; font-weight:700; line-height:17px; }

    .fu-week { display:flex; flex-direction:column; gap:8px; }
    @media (min-width:700px) { .fu-week { display:grid; grid-template-columns:repeat(7,1fr); gap:8px; } }
    .fu-day { background:var(--surf); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
    .fu-day.today .fu-day-head { background:var(--blue-bg); }
    .fu-day-head { display:flex; align-items:baseline; gap:8px; padding:8px 12px 6px; border-bottom:1px solid var(--surf2); }
    @media (min-width:700px) { .fu-day-head { flex-direction:column; align-items:center; gap:2px; text-align:center; } }
    .fu-day-dow { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); }
    .fu-day-num { font-size:16px; font-weight:700; }
    .fu-day-mon { font-size:10px; font-weight:600; color:var(--muted); }
    .fu-day.today .fu-day-dow, .fu-day.today .fu-day-num { color:var(--blue); }
    .fu-day-cards { padding:7px 9px; display:flex; flex-direction:column; gap:6px; min-height:30px; }
    @media (min-width:700px) { .fu-day-cards { min-height:200px; } }

    .fu-card { background:var(--surf2); border:1px solid var(--border); border-left:3px solid; border-radius:6px;
      padding:8px 10px; cursor:pointer; user-select:none; animation:fadeUp .18s ease; position:relative; }
    .fu-card.ef { border-left-color:var(--blue); } .fu-card.es { border-left-color:var(--orange); }
    .fu-card.if_ { border-left-color:var(--green); } .fu-card.is { border-left-color:var(--purple); }
    .fu-card.lf-warm { border-left-color:var(--red); } .fu-card.lf-cold { border-left-color:var(--blue); }
    .fu-card.overdue .cn { color:var(--red); }
    .cbadges { display:flex; flex-wrap:wrap; gap:3px; margin-bottom:4px; }
    .cb { font-size:9px; font-weight:700; padding:1px 5px; border-radius:3px; letter-spacing:.3px; white-space:nowrap; }
    .cb-ef { background:var(--blue-bg); color:var(--blue); } .cb-es { background:var(--orange-bg); color:var(--orange); }
    .cb-if { background:var(--green-bg); color:var(--green); } .cb-is { background:var(--purple-bg); color:var(--purple); }
    .cb-email { background:#0d2a3d; color:#79c0ff; } .cb-phone { background:var(--orange-bg); color:var(--orange); }
    .cb-co { background:var(--surf3); color:var(--muted); } .cb-ov { background:var(--red-bg); color:var(--red); }
    .cb-lf-warm { background:var(--red-bg); color:var(--red); } .cb-lf-cold { background:var(--blue-bg); color:var(--blue); }
    .cn { font-size:12.5px; font-weight:600; margin-bottom:1px; word-break:break-word; }
    .cc { font-size:11px; color:var(--muted); word-break:break-word; }
    .cnote { font-size:11px; color:var(--muted); margin-top:3px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .cfoot { display:flex; justify-content:flex-end; margin-top:4px; }
    .cbtn { border:1px solid var(--green); background:var(--green-bg); color:var(--green); border-radius:5px;
      padding:4px 12px; font-size:12px; cursor:pointer; font-family:inherit; }

    .lead-list-wrap { display:none; }
    .lead-empty { text-align:center; padding:50px 20px; color:var(--muted); font-size:15px; }
    .lead-item { background:var(--surf); border:1px solid var(--border); border-left:3px solid; border-radius:var(--r);
      padding:13px 14px; margin-bottom:10px; cursor:pointer; animation:fadeUp .18s ease; }
    .lead-item.warm { border-left-color:var(--red); } .lead-item.cold { border-left-color:var(--blue); }
    .li-top { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
    .li-name { font-size:15px; font-weight:700; }
    .li-meta { display:flex; flex-wrap:wrap; gap:8px; margin-top:6px; }
    .li-meta span, .li-meta a { font-size:11px; color:var(--muted); text-decoration:none; }
    .li-meta a { color:var(--blue); }
    .li-note { font-size:12px; color:var(--muted); margin-top:6px; }
    .li-dates { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; padding-top:10px; border-top:1px solid var(--border); }
    .li-date-item { display:flex; flex-direction:column; gap:2px; flex:1; min-width:140px; }
    .li-date-label { font-size:10px; font-weight:700; letter-spacing:.3px; text-transform:uppercase; color:var(--muted); }
    .li-date-val { font-size:12px; } .li-date-val.empty { color:var(--subtle); }
    .li-date-fu { font-size:10px; margin-top:1px; }
    .li-date-fu.warm { color:var(--red); } .li-date-fu.cold { color:var(--blue); }
    .li-edit-btn { background:var(--surf2); border:1px solid var(--border); color:var(--muted); width:30px; height:30px;
      border-radius:6px; cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

    .fab { position:fixed; bottom:calc(var(--nav-h) + 18px + env(safe-area-inset-bottom)); right:18px;
      width:52px; height:52px; border-radius:50%; border:none; font-size:26px; color:#fff; cursor:pointer;
      display:none; align-items:center; justify-content:center; box-shadow:0 4px 20px rgba(0,0,0,.5); z-index:140; }
    .fab.show { display:flex; }
    .fab.ext { background:var(--blue); } .fab.int { background:var(--green); }
    .fab.warm { background:var(--red); } .fab.cold { background:var(--blue); }

    /* ── MODÁLOK ── */
    .backdrop { display:none; position:fixed; inset:0; background:rgba(0,0,0,.78); backdrop-filter:blur(4px);
      z-index:300; align-items:flex-end; justify-content:center; }
    @media (min-width:560px) { .backdrop { align-items:center; } }
    .backdrop.open { display:flex; }
    .modal { background:var(--surf); border:1px solid var(--border); border-radius:14px 14px 0 0; width:100%;
      max-width:520px; max-height:88vh; overflow-y:auto; padding:20px 18px calc(20px + env(safe-area-inset-bottom));
      animation:slideUp .2s ease; }
    @media (min-width:560px) { .modal { border-radius:14px; } }
    @keyframes slideUp { from { transform:translateY(30px); opacity:0; } to { transform:none; opacity:1; } }
    .mhdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
    .mtitle { font-size:16px; font-weight:700; }
    .mclose { background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; width:32px; height:32px; }
    .fg { margin-bottom:12px; }
    .fl { display:block; font-size:11px; font-weight:700; letter-spacing:.4px; text-transform:uppercase; color:var(--muted); margin-bottom:5px; }
    .fl .req { color:var(--red); }
    .fi, .fta, select.fi { width:100%; background:var(--surf2); border:1px solid var(--border); border-radius:6px;
      color:var(--text); font-size:14px; font-family:var(--font); padding:9px 11px; outline:none; color-scheme:dark; }
    .fi:focus, .fta:focus { border-color:var(--blue); }
    .fta { resize:vertical; min-height:62px; }
    .frow { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    @media (max-width:420px) { .frow { grid-template-columns:1fr; } }
    .faction { display:flex; gap:8px; justify-content:flex-end; flex-wrap:wrap; padding-top:14px; border-top:1px solid var(--border); margin-top:14px; }
    .btn { padding:9px 16px; border-radius:6px; font-size:13px; font-weight:500; font-family:var(--font); cursor:pointer; border:1px solid; }
    .btn-cancel { background:none; border-color:var(--border); color:var(--muted); }
    .btn-ext { background:var(--blue); border-color:var(--blue); color:#fff; }
    .btn-int { background:var(--green); border-color:var(--green); color:#fff; }
    .btn-warm { background:var(--red); border-color:var(--red); color:#fff; }
    .btn-cold { background:var(--blue); border-color:var(--blue); color:#fff; }
    .btn-done { background:none; border-color:var(--green); color:var(--green); margin-right:auto; }
    .btn-del { background:none; border-color:var(--red); color:var(--red); margin-right:auto; }
    .btn-red { background:var(--taskred); border-color:var(--taskred); color:#fff; }
    .seg-row { display:flex; gap:8px; }
    .seg { flex:1; border:1.5px solid var(--surf3); border-radius:8px; padding:10px 8px; font-size:12px; font-weight:700;
      font-family:inherit; cursor:pointer; background:var(--surf2); color:var(--subtle); }
    .seg.sel-p, .seg.sel-imp { border-color:var(--taskred); color:#ff9090; background:rgba(255,77,77,.15); }
    .seg.sel-g { border-color:#4caf50; color:#80e09a; background:rgba(80,200,120,.12); }
    .seg.sel-low { border-color:#888; color:#ccc; background:rgba(255,255,255,.05); }

    .toast { position:fixed; bottom:calc(var(--nav-h) + 20px + env(safe-area-inset-bottom)); left:50%; transform:translate(-50%,5px);
      background:var(--surf2); border:1px solid var(--border); border-radius:8px; padding:9px 16px;
      font-size:12.5px; z-index:500; pointer-events:none; opacity:0; transition:all .18s; white-space:nowrap; }
    .toast.show { opacity:1; transform:translate(-50%,0); }

    /* ── BEÁLLÍTÁSOK ── */
    .set-note { font-size:12px; color:var(--muted); margin-bottom:12px; line-height:1.55; }
    .set-status { font-size:12px; margin-top:8px; min-height:18px; }
    .set-status.ok { color:var(--green); } .set-status.err { color:var(--red); }
    ::-webkit-scrollbar { width:5px; height:5px; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

    /* ── DRAG & DROP (csak desktop) ── */
    @media (pointer:fine) {
      .cal-chip[draggable="true"], .fu-card[draggable="true"] { cursor:grab; }
      .cal-chip[draggable="true"]:active, .fu-card[draggable="true"]:active { cursor:grabbing; }
      .wday-body.drag-over, .fu-day-cards.drag-over {
        background:rgba(88,166,255,.12); border-radius:6px;
        outline:2px dashed var(--blue); outline-offset:-2px;
      }
    }
  </style>
</head>

<script>
'use strict';

// ════════════════════════════════════════════════════════════
// KONSTANSOK
// ════════════════════════════════════════════════════════════
const COMPANIES = [
  { id:'sh-itb',        label:'SH-ITB',        color:'#42a5f5' },
  { id:'higiguru',      label:'HIGIGURU',       color:'#66bb6a' },
  { id:'protfilt',      label:'PROTFILT',       color:'#ef5350' },
  { id:'glanz-papir',   label:'Glanz papír',    color:'#ce93d8' },
  { id:'glanz-clean',   label:'Glanz Clean',    color:'#4dd0e1' },
  { id:'kek-duna',      label:'Kék duna',       color:'#64b5f6' },
  { id:'food-higiguru', label:'FOOD&HIGIGURU',  color:'#ffb74d' },
];
const HU_DAYS_SHORT = ['Hét','Kedd','Szer','Csüt','Pén','Szo','Vas'];
const HU_MONTHS = ['Jan','Feb','Már','Ápr','Máj','Jún','Júl','Aug','Szep','Okt','Nov','Dec'];
const HU_MONTHS_LONG = ['január','február','március','április','május','június','július','augusztus','szeptember','október','november','december'];
const DOW_SHORT = ['Vas','Hét','Kedd','Sze','Csüt','Pén','Szom'];
const MON_SHORT = ['jan','feb','már','ápr','máj','jún','júl','aug','szep','okt','nov','dec'];

// ════════════════════════════════════════════════════════════
// ÁLLAPOT + HELYI TÁROLÁS
// ════════════════════════════════════════════════════════════
const STATE_KEY = 'azs_app_state_v1';
const CFG_KEY   = 'azs_app_cfg_v1';

function freshState() {
  return {
    manual: { important:[], low:[] },
    presence: Object.fromEntries(COMPANIES.map(c=>[c.id,[]])),
    scheduled: [],
    fu: [],
    leads: [],
    coldLeads: [],
    updatedAt: 0,
  };
}
let state = freshState();
let pending = { fu: [], tasks: [] };   // szerver tulajdona, csak olvassuk
let cfg = { apiUrl:'', token:'' };

function loadLocal() {
  try { const s = JSON.parse(localStorage.getItem(STATE_KEY)); if (s) state = Object.assign(freshState(), s); } catch {}
  try { const c = JSON.parse(localStorage.getItem(CFG_KEY)); if (c) cfg = c; } catch {}
  COMPANIES.forEach(c => { if (!state.presence[c.id]) state.presence[c.id] = []; });
}
function persist() {
  state.updatedAt = Date.now();
  localStorage.setItem(STATE_KEY, JSON.stringify(state));
  schedulePush();
}
function saveCfg() { localStorage.setItem(CFG_KEY, JSON.stringify(cfg)); }

// ════════════════════════════════════════════════════════════
// SZINKRON (Apps Script)
// ════════════════════════════════════════════════════════════
let _pushTimer = null, _syncing = false;
const dot = () => document.getElementById('syncDot');
function setDot(cls) { dot().className = 'sync-dot' + (cls ? ' ' + cls : ''); }

async function api(payload) {
  if (!cfg.apiUrl || !cfg.token) throw new Error('nincs beállítva');
  var body = JSON.stringify(Object.assign({ token: cfg.token }, payload));
  var res = await fetch(cfg.apiUrl, { method: 'POST', body: body });
  var text = await res.text();
  var j;
  try { j = JSON.parse(text); } catch (e) { throw new Error('Nem JSON válasz: ' + text.slice(0, 100)); }
  if (!j.ok) throw new Error(j.error || 'hiba');
  return j;
}

function schedulePush() {
  clearTimeout(_pushTimer);
  _pushTimer = setTimeout(pushState, 1500);
}
async function pushState() {
  if (!cfg.apiUrl) return;
  setDot('busy');
  try {
    const r = await api({ action:'push', data: state });
    if (r.stored === false && r.serverData) {
      // a szerveren újabb állapot van – átvesszük
      state = Object.assign(freshState(), r.serverData);
      localStorage.setItem(STATE_KEY, JSON.stringify(state));
      renderAll();
    }
    setDot('ok');
  } catch (e) { setDot('err'); }
}
async function pullState(silent) {
  if (!cfg.apiUrl) { setDot(''); return; }
  setDot('busy');
  try {
    const r = await api({ action:'pull' });
    pending = r.pending || { fu:[], tasks:[] };
    const server = r.data || {};
    if ((server.updatedAt || 0) > (state.updatedAt || 0)) {
      state = Object.assign(freshState(), server);
      localStorage.setItem(STATE_KEY, JSON.stringify(state));
    } else if ((state.updatedAt || 0) > (server.updatedAt || 0)) {
      await api({ action:'push', data: state });
    }
    setDot('ok');
    renderAll();
  } catch (e) {
    setDot('err');
    if (!silent) toast('Szinkron hiba: ' + (e.message || e));
  }
}
function syncNow() { pullState(false); }
async function dismissOnServer(kind, id) {
  try { await api({ action:'dismiss', kind, id }); } catch (e) { toast('Szinkron hiba'); }
}
document.addEventListener('visibilitychange', () => { if (!document.hidden) pullState(true); });

// ════════════════════════════════════════════════════════════
// SEGÉDEK
// ════════════════════════════════════════════════════════════
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
let _tt;
function toast(msg) {
  const el = document.getElementById('toastEl');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 2400);
}

// naptár-modul dátumok: yyyy-MM-dd ; follow-up modul: yyyy.MM.dd (az eredeti kódokkal megegyezően)
function toDateStr(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function getMondayOf(date) { const d=new Date(date); const day=d.getDay(); d.setDate(d.getDate()+(day===0?-6:1-day)); d.setHours(0,0,0,0); return d; }
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function addBizDays(d,n){ let r=new Date(d),a=0; while(a<n){ r=addDays(r,1); if(r.getDay()!==0&&r.getDay()!==6)a++; } return r; }
function fuToStr(d){ return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`; }
function fuFromStr(s){ if(!s) return null; const [y,m,dd]=s.split('.').map(Number); return new Date(y,m-1,dd); }
function isToday(d){ const n=new Date(); return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()&&d.getDate()===n.getDate(); }
function isPast(s){ if(!s) return false; const d=fuFromStr(s),n=new Date(); n.setHours(0,0,0,0); return d<n; }
function getWkNum(d){ const u=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())); const day=u.getUTCDay()||7;
  u.setUTCDate(u.getUTCDate()+4-day); const ys=new Date(Date.UTC(u.getUTCFullYear(),0,1)); return Math.ceil((((u-ys)/86400000)+1)/7); }
function fmtDisp(s){ if(!s) return ''; const d=fuFromStr(s); return `${MON_SHORT[d.getMonth()]} ${d.getDate()}.`; }

// ════════════════════════════════════════════════════════════
// NAVIGÁCIÓ
// ════════════════════════════════════════════════════════════
const PAGE_TITLES = { presence:'Jelenlétes feladatok', calendar:'Naptár', followup:'Follow Up' };
let currentPage = 'presence';
function goPage(name, btn) {
  currentPage = name;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('.bnav button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('hdrTitle').textContent = PAGE_TITLES[name];
  document.getElementById('fab').classList.toggle('show', name==='followup');
  if (name==='calendar') renderCalendar();
  if (name==='followup') fuRender();
}

// ════════════════════════════════════════════════════════════
// FELADATOK (manual + scheduler) — az eredeti tasks.html logikája
// ════════════════════════════════════════════════════════════
function renderTaskList(listId, items, onToggle, onDelete) {
  const list = document.getElementById(listId);
  if (!list) return;
  list.innerHTML = '';
  if (!items.length) { const h=document.createElement('li'); h.className='empty-hint'; h.textContent='Nincs feladat'; list.appendChild(h); return; }
  items.forEach((item, idx) => {
    const li=document.createElement('li'); li.className='task'+(item.done?' done':'');
    const chk=document.createElement('span'); chk.className='check';
    const txt=document.createElement('span'); txt.textContent=item.text; txt.style.flex='1';
    const rm=document.createElement('span'); rm.className='remove'; rm.innerHTML='&times;';
    chk.onclick=e=>{e.stopPropagation();onToggle(idx);}; txt.onclick=()=>onToggle(idx);
    rm.onclick=e=>{e.stopPropagation();onDelete(idx);};
    li.appendChild(chk); li.appendChild(txt);
    if (item.date) { const dd=document.createElement('span'); dd.className='tdate'; dd.textContent=item.date.slice(5).replace('-','.')+'.'; li.appendChild(dd); }
    li.appendChild(rm); list.appendChild(li);
  });
}
function renderManual() {
  ['important','low'].forEach(p => {
    renderTaskList('list-'+p, state.manual[p],
      idx => { state.manual[p][idx].done = !state.manual[p][idx].done; persist(); renderManual(); },
      idx => { state.manual[p].splice(idx,1); persist(); renderManual(); });
  });
}
function addManual(priority) {
  const input=document.getElementById('input-'+priority);
  const text=input.value.trim(); if(!text) return;
  const date=document.getElementById('date-'+priority).value || null;
  state.manual[priority].push({ text, done:false, date });
  persist(); renderManual();
  input.value=''; document.getElementById('date-'+priority).value=''; input.focus();
}
function toggleScheduler(p) {
  const row=document.getElementById('scheduler-'+p);
  const open=row.classList.toggle('open');
  if(open){ const dt=document.getElementById('dt-'+p);
    if(!dt.value){ const d=new Date(Date.now()+3600000); d.setSeconds(0,0);
      d.setMinutes(d.getMinutes()-d.getTimezoneOffset()); dt.value=d.toISOString().slice(0,16); } dt.focus(); }
}
function addScheduled(p) {
  const input=document.getElementById('input-'+p), dt=document.getElementById('dt-'+p);
  const text=input.value.trim(); if(!text){input.focus();return;} if(!dt.value){dt.focus();return;}
  state.scheduled.push({ id:Date.now(), text, priority:p, scheduledFor:new Date(dt.value).getTime(), done:false });
  persist();
  input.value=''; dt.value=''; toggleScheduler(p); checkScheduled();
}
function checkScheduled() {
  const now=Date.now(), due=state.scheduled.filter(i=>i.scheduledFor<=now);
  if(!due.length) return;
  due.forEach(i=>state.manual[i.priority].push({text:i.text,done:false,date:null}));
  state.scheduled = state.scheduled.filter(i=>i.scheduledFor>now);
  persist(); renderManual();
}
setInterval(checkScheduled, 30000);

// E-mailből jelölt feladatok (szervertől)
function renderTaskPending() {
  const sec=document.getElementById('taskPendingSec'), list=document.getElementById('taskPendingList');
  const items=pending.tasks||[];
  sec.classList.toggle('has-items', items.length>0);
  list.innerHTML='';
  items.forEach(item=>{
    const div=document.createElement('div'); div.className='pending-card';
    div.innerHTML=`<div class="pi"><div class="pi-to">→ ${esc(item.to)}</div><div class="pi-text">${esc(item.text)}</div>
      <div class="pi-src">${esc(item.source)}</div></div>
      <div class="pa"><button class="btn-pa ok" onclick="approveTaskPend('${esc(item.id)}')">✓ Felvesz</button>
      <button class="btn-pa no" onclick="dismissTaskPend('${esc(item.id)}')">×</button></div>`;
    list.appendChild(div);
  });
}
function approveTaskPend(id) {
  const item=(pending.tasks||[]).find(p=>p.id===id); if(!item) return;
  state.manual.important.push({ text:item.text, done:false, date:null });
  persist(); pending.tasks=pending.tasks.filter(p=>p.id!==id);
  renderManual(); renderTaskPending(); dismissOnServer('tasks', id);
  toast('Feladat felvéve a Fontos közé');
}
function dismissTaskPend(id) {
  pending.tasks=(pending.tasks||[]).filter(p=>p.id!==id);
  renderTaskPending(); dismissOnServer('tasks', id);
}

// ════════════════════════════════════════════════════════════
// JELENLÉT — az eredeti presence logika
// ════════════════════════════════════════════════════════════
function buildPresenceBoard() {
  const board=document.getElementById('presence-board'); board.innerHTML='';
  COMPANIES.forEach(co=>{
    const col=document.createElement('div'); col.className='column col-presence'; col.style.setProperty('--cc',co.color);
    col.innerHTML=`
      <div class="column-header"><span class="dot"></span><h2>${co.label}</h2></div>
      <div class="add-area">
        <div class="add-row">
          <input id="pr-${co.id}" type="text" placeholder="Feladat…" maxlength="200">
          <button class="btn-add" onclick="addPresence('${co.id}')">+</button>
        </div>
        <div class="date-row"><label>Naptárba:</label><input type="date" id="prd-${co.id}"></div>
      </div>
      <ul class="task-list" id="plist-${co.id}"></ul>`;
    board.appendChild(col);
    document.getElementById('pr-'+co.id).addEventListener('keydown',e=>{if(e.key==='Enter')addPresence(co.id);});
  });
}
function renderPresence() {
  COMPANIES.forEach(co=>{
    renderTaskList('plist-'+co.id, state.presence[co.id]||[],
      idx=>{ state.presence[co.id][idx].done=!state.presence[co.id][idx].done; persist(); renderPresence(); },
      idx=>{ state.presence[co.id].splice(idx,1); persist(); renderPresence(); });
  });
}
function addPresence(coId) {
  const input=document.getElementById('pr-'+coId);
  const text=input.value.trim(); if(!text) return;
  const date=document.getElementById('prd-'+coId).value||null;
  state.presence[coId].push({text,done:false,date});
  persist(); renderPresence();
  input.value=''; document.getElementById('prd-'+coId).value=''; input.focus();
}

// ════════════════════════════════════════════════════════════
// NAPTÁR — heti nézet (mobilon napok egymás alatt, áthelyezés a részletekből)
// ════════════════════════════════════════════════════════════
let weekStart = getMondayOf(new Date());
function calNavWeek(dir){ weekStart=new Date(weekStart.getTime()+dir*7*86400000); renderCalendar(); }
function calGoToday(){ weekStart=getMondayOf(new Date()); renderCalendar(); }

function getCalTasks() {
  const all=[];
  ['important','low'].forEach(p=>(state.manual[p]||[]).forEach((t,idx)=>{ if(t.date) all.push({type:'personal',priority:p,idx,text:t.text,done:t.done,date:t.date}); }));
  COMPANIES.forEach(co=>(state.presence[co.id]||[]).forEach((t,idx)=>{ if(t.date) all.push({type:'presence',coId:co.id,idx,text:t.text,done:t.done,date:t.date}); }));
  return all;
}
function updateTaskDate(ref,newDate) {
  if(ref.type==='personal'){ if(state.manual[ref.priority][ref.idx]) state.manual[ref.priority][ref.idx].date=newDate; }
  else { if(state.presence[ref.coId][ref.idx]) state.presence[ref.coId][ref.idx].date=newDate; }
  persist();
}
function renderCalendar() {
  const todayStr=toDateStr(new Date());
  const days=[]; for(let i=0;i<7;i++) days.push(new Date(weekStart.getTime()+i*86400000));
  const s=days[0], e=days[6];
  document.getElementById('cal-week-label').textContent =
    `${s.getDate()}. ${HU_MONTHS[s.getMonth()]} – ${e.getDate()}. ${HU_MONTHS[e.getMonth()]} ${e.getFullYear()}`;
  const byDate={};
  getCalTasks().forEach(t=>{ (byDate[t.date]=byDate[t.date]||[]).push(t); });

  const list=document.getElementById('week-list'); list.innerHTML='';
  const isDesktop=window.matchMedia('(pointer:fine)').matches;
  days.forEach((day,di)=>{
    const dateStr=toDateStr(day);
    const row=document.createElement('div'); row.className='wday'+(dateStr===todayStr?' today':'');
    const head=document.createElement('div'); head.className='wday-head';
    head.innerHTML=`<span class="wday-dow">${HU_DAYS_SHORT[di]}</span><span class="wday-num">${day.getDate()}</span>`;
    const body=document.createElement('div'); body.className='wday-body';
    if(isDesktop){
      body.dataset.date=dateStr;
      body.addEventListener('dragover',calDragOver);
      body.addEventListener('dragleave',calDragLeave);
      body.addEventListener('drop',calDrop);
    }
    (byDate[dateStr]||[]).forEach(task=>{
      const chip=document.createElement('div'); chip.className='cal-chip '+task.type+(task.done?' done-chip':'');
      chip.innerHTML=`<span class="cal-chip-text">${esc(task.text)}</span>`;
      chip.onclick=()=>openTaskDetail(task);
      if(isDesktop){
        chip.draggable=true;
        chip.addEventListener('dragstart',function(ev){
          ev.dataTransfer.setData('application/cal-task',JSON.stringify({type:task.type,priority:task.priority,idx:task.idx,coId:task.coId}));
          ev.dataTransfer.effectAllowed='move';
          this.style.opacity='0.4';
        });
        chip.addEventListener('dragend',function(){ this.style.opacity=''; });
      }
      body.appendChild(chip);
    });
    if(!body.hasChildNodes()){ const eh=document.createElement('div'); eh.className='empty-day'; eh.textContent='·'; body.appendChild(eh); }
    head.onclick=()=>openCalModal(dateStr);
    row.appendChild(head); row.appendChild(body); list.appendChild(row);
  });
}
function calDragOver(ev){ ev.preventDefault(); ev.dataTransfer.dropEffect='move'; this.classList.add('drag-over'); }
function calDragLeave(){ this.classList.remove('drag-over'); }
function calDrop(ev){
  ev.preventDefault(); this.classList.remove('drag-over');
  var raw=ev.dataTransfer.getData('application/cal-task'); if(!raw) return;
  var ref=JSON.parse(raw); var newDate=this.dataset.date;
  updateTaskDate(ref,newDate); renderCalendar(); renderPresence(); toast('Áthelyezve');
}

// Naptár modál (feladat hozzáadása)
let _cmType='personal', _cmPri='important';
function openCalModal(dateStr) {
  const date=dateStr||toDateStr(new Date());
  _cmType='personal'; _cmPri='important';
  openModalShell('Feladat hozzáadása', `
    <div class="fg"><input class="fi" type="text" id="cm-text" placeholder="Feladat neve…" maxlength="200"></div>
    <div class="fg"><input class="fi" type="date" id="cm-date" value="${date}"></div>
    <div class="fg"><div class="seg-row">
      <button type="button" class="seg sel-p" id="cm-tp" onclick="cmSetType('personal')">Személyes</button>
      <button type="button" class="seg" id="cm-tg" onclick="cmSetType('presence')">Jelenlétes</button>
    </div></div>
    <div class="fg" id="cm-p-opts"><div class="seg-row">
      <button type="button" class="seg sel-imp" id="cm-pimp" onclick="cmSetPri('important')">Fontos</button>
      <button type="button" class="seg" id="cm-plow" onclick="cmSetPri('low')">Kevésbé fontos</button>
    </div></div>
    <div class="fg" id="cm-g-opts" style="display:none">
      <select class="fi" id="cm-co">${COMPANIES.map(c=>`<option value="${c.id}">${c.label}</option>`).join('')}</select>
    </div>`,
    `<button type="button" class="btn btn-cancel" onclick="closeAllModals()">Mégse</button>
     <button type="submit" class="btn btn-red">Hozzáad</button>`,
    e => { e.preventDefault(); submitCalModal(); });
  setTimeout(()=>document.getElementById('cm-text').focus(),60);
}
function cmSetType(t){
  _cmType=t;
  document.getElementById('cm-tp').className='seg'+(t==='personal'?' sel-p':'');
  document.getElementById('cm-tg').className='seg'+(t==='presence'?' sel-g':'');
  document.getElementById('cm-p-opts').style.display=t==='personal'?'':'none';
  document.getElementById('cm-g-opts').style.display=t==='presence'?'':'none';
}
function cmSetPri(p){
  _cmPri=p;
  document.getElementById('cm-pimp').className='seg'+(p==='important'?' sel-imp':'');
  document.getElementById('cm-plow').className='seg'+(p==='low'?' sel-low':'');
}
function submitCalModal(){
  const text=document.getElementById('cm-text').value.trim();
  const date=document.getElementById('cm-date').value;
  if(!text||!date) return;
  if(_cmType==='personal') state.manual[_cmPri].push({text,done:false,date});
  else { const coId=document.getElementById('cm-co').value; state.presence[coId].push({text,done:false,date}); }
  persist(); closeAllModals(); renderManual(); renderPresence(); renderCalendar();
}

// Feladat részletei + áthelyezés (a drag&drop mobilbarát kiváltása)
function openTaskDetail(task) {
  let dateLabel='';
  if (task.date) { const p=task.date.split('-'); dateLabel=`${p[0]}. ${HU_MONTHS_LONG[parseInt(p[1])-1]} ${parseInt(p[2])}.`; }
  const tagLabel = task.type==='personal' ? 'Személyes feladat' : 'Jelenlétes feladat';
  openModalShell(tagLabel, `
    <div class="fg" style="font-size:17px;font-weight:500;line-height:1.55;word-break:break-word">${esc(task.text)}</div>
    ${dateLabel?`<div class="fg" style="font-size:12px;color:var(--muted)">${dateLabel}</div>`:''}
    <div class="fg"><label class="fl">Áthelyezés másik napra</label><input class="fi" type="date" id="td-date" value="${task.date||''}"></div>`,
    `<button type="button" class="btn btn-del" onclick="tdRemoveDate()">Naptárból ki</button>
     <button type="button" class="btn btn-cancel" onclick="closeAllModals()">Bezárás</button>
     <button type="submit" class="btn btn-red">Áthelyez</button>`,
    e => { e.preventDefault();
      const nd=document.getElementById('td-date').value;
      if(nd){ updateTaskDate(task,nd); closeAllModals(); renderCalendar(); renderManual(); renderPresence(); toast('Áthelyezve: '+nd); } });
  window.tdRemoveDate = () => { updateTaskDate(task,null); closeAllModals(); renderCalendar(); renderManual(); renderPresence(); toast('Eltávolítva a naptárból'); };
}

// ════════════════════════════════════════════════════════════
// FOLLOW-UP — az eredeti follow-up.html logikája (drag → modálos áthelyezés)
// ════════════════════════════════════════════════════════════
let FU = { tab:'external', weekStart:getMondayOf(new Date()), editId:null, leadType:'warm', editLeadId:null };

function fuSwitchTab(t){ FU.tab=t; fuRender(); }
function fuShiftWeek(d){ FU.weekStart=addDays(FU.weekStart,d*7); fuRender(); }
function fuGoToday(){ FU.weekStart=getMondayOf(new Date()); fuRender(); }
function fuInWeek(s){ if(!s) return false; const d=fuFromStr(s), end=addDays(FU.weekStart,7); return d>=FU.weekStart&&d<end; }

function fuRender(){ fuRenderHdr(); fuRenderTabs(); fuRenderGrid(); fuRenderLeadList(); fuRenderFab(); renderFuPending(); }

function fuRenderHdr() {
  const wn=getWkNum(FU.weekStart);
  document.getElementById('wkLabel').textContent=`${FU.weekStart.getFullYear()} / ${wn}. hét`;
  const pb=document.getElementById('parityBadge');
  pb.textContent = wn%2!==0 ? 'páratlan' : 'páros';
  pb.className = `parity ${wn%2!==0?'odd':'even'}`;
}
function fuRenderTabs() {
  document.getElementById('cntExt').textContent  = state.fu.filter(f=>f.type==='external').length;
  document.getElementById('cntInt').textContent  = state.fu.filter(f=>f.type==='internal').length;
  document.getElementById('cntWarm').textContent = state.leads.length;
  document.getElementById('cntCold').textContent = state.coldLeads.length;
  document.getElementById('tabExt').className  = `fu-tab ext${FU.tab==='external'?' active':''}`;
  document.getElementById('tabInt').className  = `fu-tab int${FU.tab==='internal'?' active':''}`;
  document.getElementById('tabWarm').className = `fu-tab warm${FU.tab==='warm'?' active':''}`;
  document.getElementById('tabCold').className = `fu-tab cold${FU.tab==='cold'?' active':''}`;
}
function fuRenderFab() {
  const t=FU.tab;
  document.getElementById('fab').className =
    'fab show '+(t==='internal'?'int':t==='warm'?'warm':t==='cold'?'cold':'ext');
  if(currentPage!=='followup') document.getElementById('fab').classList.remove('show');
}
function fabClick() {
  if (FU.tab==='warm'||FU.tab==='cold') openLeadModal(null, FU.tab);
  else openFuModal(null);
}

function getLeadFUs(lead) {
  const items=[];
  if (lead.contactDate){ const d=fuFromStr(lead.contactDate); if(d) items.push({leadId:lead.id,date:fuToStr(addBizDays(d,5)),label:'Területfelmérés megbeszélése',fieldKey:'contactDate'}); }
  if (lead.surveyDate){ const d=fuFromStr(lead.surveyDate); if(d) items.push({leadId:lead.id,date:fuToStr(addBizDays(d,5)),label:'Feltételek egyeztetése / Árajánlat',fieldKey:'surveyDate'}); }
  if (lead.quoteAcceptedDate){ const d=fuFromStr(lead.quoteAcceptedDate); if(d) items.push({leadId:lead.id,date:fuToStr(addBizDays(d,5)),label:'Szerződés aláírva?',fieldKey:'quoteAcceptedDate'}); }
  return items;
}
function dismissLeadFU(leadId, fieldKey, type, e) {
  if(e) e.stopPropagation();
  const arr = type==='cold' ? state.coldLeads : state.leads;
  const lead = arr.find(l=>l.id===leadId); if(!lead) return;
  lead[fieldKey]=''; persist(); fuRender(); toast('Elvégezve');
}

function fuRenderGrid() {
  const grid=document.getElementById('fuWeek'), wrap=document.getElementById('leadListWrap');
  if (FU.tab==='warm'||FU.tab==='cold'){ grid.style.display='none'; wrap.style.display='block'; return; }
  grid.style.display=''; wrap.style.display='none';
  grid.innerHTML='';
  const dayEls={};
  const isDesktop=window.matchMedia('(pointer:fine)').matches;
  for(let i=0;i<7;i++){
    const day=addDays(FU.weekStart,i), dayStr=fuToStr(day);
    const col=document.createElement('div'); col.className=`fu-day${isToday(day)?' today':''}`;
    col.innerHTML=`<div class="fu-day-head"><span class="fu-day-dow">${DOW_SHORT[day.getDay()]}</span>
      <span class="fu-day-num">${day.getDate()}</span><span class="fu-day-mon">${MON_SHORT[day.getMonth()]}.</span></div>
      <div class="fu-day-cards"></div>`;
    grid.appendChild(col);
    const cards=col.querySelector('.fu-day-cards');
    if(isDesktop){
      cards.dataset.fudate=dayStr;
      cards.addEventListener('dragover',fuDragOver);
      cards.addEventListener('dragleave',fuDragLeave);
      cards.addEventListener('drop',fuDrop);
    }
    dayEls[dayStr]=cards;
  }
  const tabType = FU.tab==='external' ? 'external' : 'internal';
  for (const fu of state.fu.filter(f=>f.type===tabType)) {
    for (const field of ['firstFollowUpDate','secondFollowUpDate']) {
      if (!fu[field] || !fuInWeek(fu[field])) continue;
      const c=dayEls[fu[field]]; if(c) c.appendChild(makeFuCard(fu, field));
    }
  }
  if (FU.tab==='external') {
    for (const lead of state.leads) for (const vfu of getLeadFUs(lead))
      if (fuInWeek(vfu.date) && dayEls[vfu.date]) dayEls[vfu.date].appendChild(makeLeadFUCard(vfu, lead, 'warm'));
    for (const lead of state.coldLeads) for (const vfu of getLeadFUs(lead))
      if (fuInWeek(vfu.date) && dayEls[vfu.date]) dayEls[vfu.date].appendChild(makeLeadFUCard(vfu, lead, 'cold'));
  }
  Object.values(dayEls).forEach(c=>{ if(!c.hasChildNodes()) c.innerHTML='<div class="empty-day">·</div>'; });
}
function fuDragOver(ev){ ev.preventDefault(); ev.dataTransfer.dropEffect='move'; this.classList.add('drag-over'); }
function fuDragLeave(){ this.classList.remove('drag-over'); }
function fuDrop(ev){
  ev.preventDefault(); this.classList.remove('drag-over');
  var raw=ev.dataTransfer.getData('application/fu-card'); if(!raw) return;
  var ref=JSON.parse(raw); var newDate=this.dataset.fudate;
  var fu=state.fu.find(function(f){ return f.id===ref.fuId; }); if(!fu) return;
  fu[ref.field]=newDate;
  persist(); fuRender(); toast('Áthelyezve');
}

function makeFuCard(fu, field) {
  const isFirst=field==='firstFollowUpDate', isInt=fu.type==='internal', past=isPast(fu[field]);
  const ccls = isInt ? (isFirst?'if_':'is') : (isFirst?'ef':'es');
  const card=document.createElement('div'); card.className=`fu-card ${ccls}${past?' overdue':''}`;
  const badgeTxt=isFirst?'1. Follow-up':'2. Follow-up';
  const badgeCls={ef:'cb-ef',es:'cb-es',if_:'cb-if',is:'cb-is'}[ccls];
  const actBadge = !isInt&&isFirst ? '<span class="cb cb-email">E-mail</span>' : !isInt&&!isFirst ? '<span class="cb cb-phone">Telefon</span>' : '';
  const ovBadge = past ? '<span class="cb cb-ov">Lejárt</span>' : '';
  const coBadge = fu.myCompany ? `<span class="cb cb-co">${esc(fu.myCompany)}</span>` : '';
  const coLine = fu.company ? `<div class="cc">${esc(fu.company)}${fu.optionalCompany?' · '+esc(fu.optionalCompany):''}</div>` : '';
  const emailLine = fu.email ? `<div class="cc"><a href="mailto:${esc(fu.email)}" style="color:var(--blue);text-decoration:none" onclick="event.stopPropagation()">${esc(fu.email)}</a></div>` : '';
  const noteLine = fu.note ? `<div class="cnote">${esc(fu.note)}</div>` : '';
  card.innerHTML=`<div class="cbadges"><span class="cb ${badgeCls}">${badgeTxt}</span>${actBadge}${coBadge}${ovBadge}</div>
    <div class="cn">${esc(fu.name)}</div>${coLine}${emailLine}${noteLine}
    <div class="cfoot"><button class="cbtn" onclick="markDone('${fu.id}','${field}',event)">✓</button></div>`;
  card.addEventListener('click', e=>{ if(e.target.closest('.cbtn')) return; openFuModal(fu.id); });
  if(window.matchMedia('(pointer:fine)').matches){
    card.draggable=true;
    card.addEventListener('dragstart',function(ev){
      ev.dataTransfer.setData('application/fu-card',JSON.stringify({fuId:fu.id,field:field}));
      ev.dataTransfer.effectAllowed='move'; this.style.opacity='0.4';
    });
    card.addEventListener('dragend',function(){ this.style.opacity=''; });
  }
  return card;
}
function makeLeadFUCard(vfu, lead, type) {
  const past=isPast(vfu.date), isWarm=type==='warm';
  const card=document.createElement('div');
  card.className=`fu-card ${isWarm?'lf-warm':'lf-cold'}${past?' overdue':''}`;
  card.innerHTML=`<div class="cbadges"><span class="cb ${isWarm?'cb-lf-warm':'cb-lf-cold'}">${isWarm?'Warm lead':'Cold lead'}</span>
    ${past?'<span class="cb cb-ov">Lejárt</span>':''}</div>
    <div class="cn">${esc(lead.name)}</div>
    <div class="cc" style="color:${isWarm?'var(--red)':'var(--blue)'};font-size:11px">${esc(vfu.label)}</div>
    ${lead.note?`<div class="cnote">${esc(lead.note)}</div>`:''}
    <div class="cfoot"><button class="cbtn" onclick="dismissLeadFU('${lead.id}','${vfu.fieldKey}','${type}',event)">✓</button></div>`;
  card.addEventListener('click', e=>{ if(e.target.closest('.cbtn')) return; openLeadModal(lead.id, type); });
  return card;
}

function fuRenderLeadList() {
  const wrap=document.getElementById('leadListWrap');
  if (FU.tab!=='warm'&&FU.tab!=='cold') return;
  const isWarm=FU.tab==='warm';
  const arr=isWarm?state.leads:state.coldLeads;
  const fuCls=isWarm?'warm':'cold';
  if(!arr.length){ wrap.innerHTML=`<div class="lead-empty">Még nincs ${isWarm?'warm':'cold'} lead.<br><span style="font-size:13px;opacity:.6">Nyomd a + gombot az első felvételéhez.</span></div>`; return; }
  wrap.innerHTML='';
  for (const lead of arr) {
    const datesHtml=[
      { label:'Kapcsolatfelvétel', val:lead.contactDate, fu:lead.contactDate?fuToStr(addBizDays(fuFromStr(lead.contactDate),5)):null },
      { label:'Területfelmérés', val:lead.surveyDate, fu:lead.surveyDate?fuToStr(addBizDays(fuFromStr(lead.surveyDate),5)):null },
      { label:'Árajánlat elfogadva', val:lead.quoteAcceptedDate, fu:lead.quoteAcceptedDate?fuToStr(addBizDays(fuFromStr(lead.quoteAcceptedDate),5)):null },
    ].map(d=>`<div class="li-date-item"><div class="li-date-label">${d.label}</div>
      <div class="li-date-val${d.val?'':' empty'}">${d.val||'—'}</div>
      ${d.fu?`<div class="li-date-fu ${fuCls}">→ FU: ${d.fu}</div>`:''}</div>`).join('');
    const div=document.createElement('div'); div.className=`lead-item ${fuCls}`;
    div.innerHTML=`<div class="li-top"><div class="li-name">${esc(lead.name)}</div>
      <button class="li-edit-btn" onclick="event.stopPropagation();openLeadModal('${lead.id}','${fuCls}')">✎</button></div>
      <div class="li-meta">${lead.email?`<a href="mailto:${esc(lead.email)}" onclick="event.stopPropagation()">${esc(lead.email)}</a>`:''}
      ${lead.phone?`<span>${esc(lead.phone)}</span>`:''}</div>
      ${lead.note?`<div class="li-note">${esc(lead.note)}</div>`:''}
      <div class="li-dates">${datesHtml}</div>`;
    div.addEventListener('click', ()=>openLeadModal(lead.id, fuCls));
    wrap.appendChild(div);
  }
}

// Follow-up pending (e-mail → belső follow-up)
function renderFuPending() {
  const sec=document.getElementById('fuPendingSec');
  if (FU.tab!=='internal'){ sec.classList.remove('has-items'); return; }
  const items=pending.fu||[];
  const list=document.getElementById('fuPendingList'); list.innerHTML='';
  sec.classList.toggle('has-items', items.length>0);
  items.forEach(item=>{
    const div=document.createElement('div'); div.className='pending-card';
    div.innerHTML=`<div class="pi"><div class="pi-to">→ ${esc(item.to)}</div><div class="pi-text">${esc(item.text)}</div>
      <div class="pi-src">${esc(item.source)}</div></div>
      <div class="pi-date">${fmtDisp(item.suggestedDate)}</div>
      <div class="pa"><button class="btn-pa ok" onclick="approveFuPend('${esc(item.id)}')">✓ Felvesz</button>
      <button class="btn-pa no" onclick="dismissFuPend('${esc(item.id)}')">×</button></div>`;
    list.appendChild(div);
  });
}
function approveFuPend(id) {
  const item=(pending.fu||[]).find(p=>p.id===id); if(!item) return;
  state.fu.push({ id:uid(), type:'internal', name:item.to, company:'', optionalCompany:'', myCompany:'',
    email:'', note:item.text, firstFollowUpDate:item.suggestedDate, secondFollowUpDate:'',
    source:'email', emailId:item.id, emailSource:item.source, createdAt:fuToStr(new Date()) });
  persist(); pending.fu=pending.fu.filter(p=>p.id!==id);
  fuRender(); dismissOnServer('fu', id);
  toast('Belső follow-up felvéve');
}
function dismissFuPend(id) {
  pending.fu=(pending.fu||[]).filter(p=>p.id!==id);
  renderFuPending(); dismissOnServer('fu', id);
}

// Follow-up modál
function openFuModal(id) {
  FU.editId=id||null;
  const isEdit=!!id;
  const fu=isEdit?state.fu.find(f=>f.id===id):null;
  const isInt=fu?fu.type==='internal':FU.tab==='internal';
  const v=k=>esc(fu?.[k]||'');
  const di=s=>s?s.replace(/\./g,'-'):'';
  const fields = !isInt ? `
    <div class="fg"><label class="fl">Ügyfél neve <span class="req">*</span></label><input class="fi" name="name" required value="${v('name')}"></div>
    <div class="frow">
      <div class="fg"><label class="fl">Cégnév <span class="req">*</span></label><input class="fi" name="company" required value="${v('company')}"></div>
      <div class="fg"><label class="fl">Opcionális cégnév</label><input class="fi" name="optionalCompany" value="${v('optionalCompany')}"></div>
    </div>
    <div class="frow">
      <div class="fg"><label class="fl">Saját cég</label><input class="fi" name="myCompany" placeholder="pl. Glanz Papír Clean Kft." value="${v('myCompany')}"></div>
      <div class="fg"><label class="fl">E-mail (opcionális)</label><input class="fi" name="email" type="email" value="${v('email')}"></div>
    </div>
    <div class="fg"><label class="fl">Megjegyzés / Follow-up tárgya <span class="req">*</span></label><textarea class="fta" name="note" required>${esc(fu?.note||'')}</textarea></div>
    <div class="frow">
      <div class="fg"><label class="fl">1. Follow-up dátuma</label><input class="fi" name="firstFollowUpDate" type="date" value="${di(fu?.firstFollowUpDate)}"></div>
      <div class="fg"><label class="fl">2. Follow-up dátuma</label><input class="fi" name="secondFollowUpDate" type="date" value="${di(fu?.secondFollowUpDate)}"></div>
    </div>
    <div id="dateErr" style="display:none;font-size:11px;color:var(--red);margin-top:-6px;margin-bottom:8px">Legalább egy follow-up dátumot adj meg.</div>` : `
    <div class="fg"><label class="fl">Alkalmazott neve <span class="req">*</span></label><input class="fi" name="name" required value="${v('name')}"></div>
    <div class="frow">
      <div class="fg"><label class="fl">Saját cég (opcionális)</label><input class="fi" name="myCompany" placeholder="pl. Glanz Papír Clean Kft." value="${v('myCompany')}"></div>
      <div class="fg"><label class="fl">E-mail (opcionális)</label><input class="fi" name="email" type="email" value="${v('email')}"></div>
    </div>
    <div class="fg"><label class="fl">Megjegyzés / Feladat tárgya <span class="req">*</span></label><textarea class="fta" name="note" required>${esc(fu?.note||'')}</textarea></div>
    <div class="frow">
      <div class="fg"><label class="fl">1. Follow-up dátuma</label><input class="fi" name="firstFollowUpDate" type="date" value="${di(fu?.firstFollowUpDate)}"></div>
      <div class="fg"><label class="fl">2. Follow-up dátuma</label><input class="fi" name="secondFollowUpDate" type="date" value="${di(fu?.secondFollowUpDate)}"></div>
    </div>
    <div id="dateErr" style="display:none;font-size:11px;color:var(--red);margin-top:-6px;margin-bottom:8px">Legalább egy follow-up dátumot adj meg.</div>`;
  const sc=isInt?'btn-int':'btn-ext';
  openModalShell(
    isEdit ? (isInt?'Belső follow-up szerkesztése':'Külső follow-up szerkesztése') : (isInt?'Új belső follow-up':'Új külső follow-up'),
    fields,
    `${isEdit?`<button type="button" class="btn btn-done" onclick="markDone('${id}')">✓ Elvégezve</button>`:''}
     <button type="button" class="btn btn-cancel" onclick="closeAllModals()">Mégse</button>
     <button type="submit" class="btn ${sc}">${isEdit?'Mentés':'Hozzáadás'}</button>`,
    handleFuSubmit);
}
function handleFuSubmit(e) {
  e.preventDefault();
  const fd=new FormData(e.target);
  const i2d=v=>v?v.replace(/-/g,'.'):'';
  const isInt = FU.editId ? state.fu.find(f=>f.id===FU.editId)?.type==='internal' : FU.tab==='internal';
  if (!fd.get('firstFollowUpDate') && !fd.get('secondFollowUpDate')) {
    const err=document.getElementById('dateErr'); if(err){ err.style.display='block'; err.scrollIntoView({block:'nearest'}); } return;
  }
  const common = {
    name:fd.get('name'), company:fd.get('company')||'', optionalCompany:fd.get('optionalCompany')||'',
    myCompany:fd.get('myCompany')||'', email:fd.get('email')||'', note:fd.get('note'),
    firstFollowUpDate:i2d(fd.get('firstFollowUpDate')), secondFollowUpDate:i2d(fd.get('secondFollowUpDate')),
  };
  if (FU.editId) {
    const fu=state.fu.find(f=>f.id===FU.editId); if(fu) Object.assign(fu, common);
  } else {
    state.fu.push(Object.assign({ id:uid(), type:isInt?'internal':'external', source:'manual', createdAt:fuToStr(new Date()) }, common));
  }
  persist(); closeAllModals(); fuRender();
  toast(FU.editId?'Módosítva':'Follow-up hozzáadva');
  FU.editId=null;
}
function markDone(id, fieldOrEvent, e) {
  let field=null;
  if (typeof fieldOrEvent==='string') field=fieldOrEvent; else e=fieldOrEvent;
  if(e) e.stopPropagation();
  const fu=state.fu.find(f=>f.id===id); if(!fu) return;
  if(field){
    fu[field]='';
    if(!fu.firstFollowUpDate && !fu.secondFollowUpDate) state.fu=state.fu.filter(f=>f.id!==id);
  } else state.fu=state.fu.filter(f=>f.id!==id);
  persist(); closeAllModals(); fuRender(); toast('Elvégezve');
}

// Lead modál
function openLeadModal(id, type) {
  FU.editLeadId=id||null; FU.leadType=type||FU.tab;
  const isWarm=FU.leadType!=='cold';
  const arr=isWarm?state.leads:state.coldLeads;
  const isEdit=!!id;
  const lead=isEdit?arr.find(l=>l.id===id):null;
  const typeLabel=isWarm?'Warm lead':'Cold lead';
  const accent=isWarm?'var(--red)':'var(--blue)';
  const v=k=>esc(lead?.[k]||'');
  const di=s=>s?s.replace(/\./g,'-'):'';
  const fuPrev = (dStr,label)=> dStr?`<div style="font-size:10px;color:${accent};margin-top:4px">→ FU: ${fuToStr(addBizDays(fuFromStr(dStr),5))} — ${label}</div>`:'';
  openModalShell(isEdit?`${typeLabel} szerkesztése`:`Új ${typeLabel} hozzáadása`, `
    <div class="fg"><label class="fl">Ügyfél neve / Cégnév <span class="req">*</span></label><input class="fi" name="name" required value="${v('name')}"></div>
    <div class="frow">
      <div class="fg"><label class="fl">E-mail (opcionális)</label><input class="fi" name="email" type="email" value="${v('email')}"></div>
      <div class="fg"><label class="fl">Telefon (opcionális)</label><input class="fi" name="phone" type="tel" value="${v('phone')}"></div>
    </div>
    <div class="fg"><label class="fl">Megjegyzés (opcionális)</label><textarea class="fta" name="note">${esc(lead?.note||'')}</textarea></div>
    <div style="margin-bottom:10px;font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:${accent}">Folyamat dátumai</div>
    <div class="fg"><label class="fl">Kapcsolatfelvétel időpontja</label><input class="fi" name="contactDate" type="date" value="${di(lead?.contactDate)}">${fuPrev(lead?.contactDate,'Területfelmérés megbeszélése')}</div>
    <div class="fg"><label class="fl">Területfelmérés időpontja</label><input class="fi" name="surveyDate" type="date" value="${di(lead?.surveyDate)}">${fuPrev(lead?.surveyDate,'Feltételek egyeztetése / Árajánlat')}</div>
    <div class="fg"><label class="fl">Árajánlat elfogadása</label><input class="fi" name="quoteAcceptedDate" type="date" value="${di(lead?.quoteAcceptedDate)}">${fuPrev(lead?.quoteAcceptedDate,'Szerződés aláírva?')}</div>`,
    `${isEdit?`<button type="button" class="btn btn-del" onclick="deleteLead('${id}')">Törlés</button>`:''}
     <button type="button" class="btn btn-cancel" onclick="closeAllModals()">Mégse</button>
     <button type="submit" class="btn ${isWarm?'btn-warm':'btn-cold'}">${isEdit?'Mentés':'Hozzáadás'}</button>`,
    handleLeadSubmit);
}
function handleLeadSubmit(e) {
  e.preventDefault();
  const fd=new FormData(e.target);
  const i2d=v=>v?v.replace(/-/g,'.'):'';
  const isCold=FU.leadType==='cold';
  const arr=isCold?state.coldLeads:state.leads;
  const fields={
    name:fd.get('name'), email:fd.get('email')||'', phone:fd.get('phone')||'', note:fd.get('note')||'',
    contactDate:i2d(fd.get('contactDate')), surveyDate:i2d(fd.get('surveyDate')), quoteAcceptedDate:i2d(fd.get('quoteAcceptedDate')),
  };
  if (FU.editLeadId) {
    const lead=arr.find(l=>l.id===FU.editLeadId); if(lead) Object.assign(lead, fields);
  } else arr.push(Object.assign({ id:uid(), createdAt:fuToStr(new Date()) }, fields));
  persist(); closeAllModals(); fuRender();
  toast(FU.editLeadId?'Lead módosítva':'Lead hozzáadva');
  FU.editLeadId=null;
}
function deleteLead(id) {
  if (FU.leadType==='cold') state.coldLeads=state.coldLeads.filter(l=>l.id!==id);
  else state.leads=state.leads.filter(l=>l.id!==id);
  persist(); closeAllModals(); fuRender(); toast('Lead törölve');
}

// MODÁL KERET
// ════════════════════════════════════════════════════════════
function openModalShell(title, fieldsHtml, actionsHtml, onSubmit) {
  document.getElementById('mTitle').textContent=title;
  document.getElementById('formFields').innerHTML=fieldsHtml;
  document.getElementById('formActions').innerHTML=actionsHtml;
  document.getElementById('modalForm').onsubmit=onSubmit;
  document.getElementById('backdrop').classList.add('open');
}
function closeAllModals() { document.getElementById('backdrop').classList.remove('open'); FU.editId=null; FU.editLeadId=null; }
function handleBdClick(e){ if(e.target.classList.contains('backdrop')) closeAllModals(); }
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeAllModals(); });

// BEÁLLÍTÁSOK + IMPORT/EXPORT
// ════════════════════════════════════════════════════════════
function openSettings() {
  openModalShell('Beállítások', `
    <div class="set-note">Add meg az Apps Script web app URL-jét és a tokent (lásd TELEPITES.md). A zöld pötty jelzi, ha a szinkron él.</div>
    <div class="fg"><label class="fl">Apps Script URL</label><input class="fi" id="set-url" placeholder="https://script.google.com/macros/s/…/exec" value="${esc(cfg.apiUrl)}"></div>
    <div class="fg"><label class="fl">Token</label><input class="fi" id="set-token" value="${esc(cfg.token)}"></div>
    <div class="fg"><button type="button" class="btn btn-cancel" onclick="testConnection()">Kapcsolat tesztelése</button>
      <span class="set-status" id="set-status"></span></div>
    <div class="fg" style="border-top:1px solid var(--border);padding-top:14px">
      <label class="fl">Régi adatok importálása</label>
      <div class="set-note">A régi tasks.html / follow-up.html oldalon nyisd meg a böngészőkonzolt (F12), futtasd a TELEPITES.md-ben lévő export parancsot, és illeszd ide az eredményt.</div>
      <textarea class="fta" id="set-import" placeholder='{"tasks-v2":…}'></textarea>
      <div style="margin-top:8px;display:flex;gap:8px">
        <button type="button" class="btn btn-int" onclick="doImport()">Importálás</button>
        <button type="button" class="btn btn-cancel" onclick="doExport()">Adatok exportálása</button>
      </div>
    </div>`,
    `<button type="button" class="btn btn-cancel" onclick="closeAllModals()">Bezárás</button>
     <button type="submit" class="btn btn-red">Mentés</button>`,
    e => { e.preventDefault();
      cfg.apiUrl=document.getElementById('set-url').value.trim();
      cfg.token=document.getElementById('set-token').value.trim();
      saveCfg(); closeAllModals(); toast('Beállítások mentve'); pullState(false); });
}
async function testConnection() {
  const st=document.getElementById('set-status');
  st.textContent='Tesztelés…'; st.className='set-status';
  const url=document.getElementById('set-url').value.trim();
  const token=document.getElementById('set-token').value.trim();
  try {
    const res=await fetch(url,{method:'POST',body:JSON.stringify({token:token,action:'pull'})});
    const text=await res.text();
    var j; try { j=JSON.parse(text); } catch(pe) { st.textContent='Nem JSON válasz: '+text.slice(0,80); st.className='set-status err'; return; }
    if(j.ok){ st.textContent='Kapcsolat él.'; st.className='set-status ok'; }
    else { st.textContent='Hiba: '+(j.error||'ismeretlen'); st.className='set-status err'; }
  } catch(e){ st.textContent='Nem érhető el: '+e.message; st.className='set-status err'; }
}
function doImport() {
  const raw=document.getElementById('set-import').value.trim();
  if(!raw){ toast('Üres a mező'); return; }
  let obj;
  try { obj=JSON.parse(raw); } catch { toast('Érvénytelen JSON'); return; }
  const parse=k=>{ try { return typeof obj[k]==='string'?JSON.parse(obj[k]):obj[k]; } catch { return null; } };
  let imported=0;
  const m=parse('tasks-v2'); if(m&&m.important){ state.manual=m; imported++; }
  const pr=parse('presence-v2'); if(pr){ COMPANIES.forEach(c=>{ if(pr[c.id]) state.presence[c.id]=pr[c.id]; }); imported++; }
  const sc=parse('scheduled-tasks-v1'); if(Array.isArray(sc)){ state.scheduled=sc; imported++; }
  const f=parse('followup_v1'); if(Array.isArray(f)){ state.fu=f; imported++; }
  const l=parse('leads_v1'); if(Array.isArray(l)){ state.leads=l; imported++; }
  const cl=parse('cold_leads_v1'); if(Array.isArray(cl)){ state.coldLeads=cl; imported++; }
  if(!imported){ toast('Nem találtam ismert kulcsot'); return; }
  persist(); renderAll(); closeAllModals();
  toast(imported+' adathalmaz importálva');
}
function doExport() {
  const s=JSON.stringify(state);
  navigator.clipboard?.writeText(s).then(()=>toast('Vágólapra másolva')).catch(()=>{
    prompt('Másold ki:', s);
  });
}

function renderAll() {
  renderManual(); renderPresence(); renderTaskPending();
  if(currentPage==='calendar') renderCalendar();
  if(currentPage==='followup') fuRender();
}
loadLocal();
buildPresenceBoard();
checkScheduled();
renderAll();
pullState(true);
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
